[pytest]
pythonpath = .
testpaths = tests
addopts = -ra --strict-markers --disable-warnings --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-report=html:coverage_html --cov-report=xml:coverage.xml --cov-fail-under=85
asyncio_default_fixture_loop_scope = function
markers =
    api: API and endpoint tests
    contract: request and response schema compatibility checks
    integration: integration tests across multiple services
    load: concurrent and higher-throughput reliability checks
    migration: alembic upgrade path and compatibility checks
    performance: basic latency and slow-endpoint checks
    security: authorization, workspace isolation, and input-hardening tests

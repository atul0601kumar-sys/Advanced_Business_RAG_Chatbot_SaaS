services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: rag_frontend
    restart: unless-stopped
    env_file:
      - .env
      - frontend/.env.local
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Advanced Business RAG Chatbot SaaS}
      NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-0.3.0}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    restart: unless-stopped
    env_file:
      - .env
      - backend/.env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.3.0}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://rag_admin:rag_password@postgres:5432/rag_chatbot}
      QDRANT_URL: ${DOCKER_QDRANT_URL:-http://qdrant:6333}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      TASK_QUEUE_ENABLED: ${TASK_QUEUE_ENABLED:-true}
      WORKER_MODE: ${WORKER_MODE:-external}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_BUCKET_NAME: ${SUPABASE_BUCKET_NAME:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ALLOW_DESTRUCTIVE_MIGRATIONS: ${ALLOW_DESTRUCTIVE_MIGRATIONS:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend:3000}
      WIDGET_PUBLIC_API_BASE_URL: ${WIDGET_PUBLIC_API_BASE_URL:-http://backend:8000}
      WIDGET_SCRIPT_URL: ${WIDGET_SCRIPT_URL:-http://frontend:3000/widget.js}
      STORAGE_DIR: /app/storage/uploads
      EXPORT_STORAGE_DIR: /app/storage/exports
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - storage_uploads:/app/storage/uploads
      - storage_exports:/app/storage/exports
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      /bin/sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=3)\""]
      interval: 20s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_worker
    restart: unless-stopped
    env_file:
      - .env
      - backend/.env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.3.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://rag_admin:rag_password@postgres:5432/rag_chatbot}
      QDRANT_URL: ${DOCKER_QDRANT_URL:-http://qdrant:6333}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      TASK_QUEUE_ENABLED: ${TASK_QUEUE_ENABLED:-true}
      WORKER_MODE: external
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_BUCKET_NAME: ${SUPABASE_BUCKET_NAME:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      STORAGE_DIR: /app/storage/uploads
      EXPORT_STORAGE_DIR: /app/storage/exports
    volumes:
      - storage_uploads:/app/storage/uploads
      - storage_exports:/app/storage/exports
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from app.worker import is_worker_healthy; raise SystemExit(0 if is_worker_healthy() else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: rag_nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/nginx-health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.5
    container_name: rag_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  storage_uploads:
  storage_exports:
